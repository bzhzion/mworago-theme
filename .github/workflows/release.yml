name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile .mo files
        run: |
          curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          php wp-cli.phar i18n make-mo languages/

      - name: Create zip
        run: |
          mkdir -p dist
          cd ..
          zip -r "$GITHUB_WORKSPACE/dist/mworago-theme.zip" mworago-theme \
            --exclude "mworago-theme/.git*" \
            --exclude "mworago-theme/.github/*" \
            --exclude "mworago-theme/dist/*"
          sha256sum "$GITHUB_WORKSPACE/dist/mworago-theme.zip" | awk '{print $1}' > "$GITHUB_WORKSPACE/dist/mworago-theme.zip.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mworago-theme.zip
            dist/mworago-theme.zip.sha256
          generate_release_notes: false
